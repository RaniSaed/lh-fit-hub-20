version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lh-fit-hub-postgres
    environment:
      POSTGRES_USER: lh_admin
      POSTGRES_PASSWORD: supersecurepassword123
      POSTGRES_DB: lh_fit_hub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: lh-fit-hub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lhfithub.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
